<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TresorAnalytics — Plateforme souveraine de reporting fiscal du Trésor du Cameroun" />
    <title>TresorAnalytics — Reporting Fiscal</title>
    <!-- Theme bootstrap: restore persisted theme, default to light -->
    <script>
      (function() {
        var storedTheme = localStorage.getItem('theme');
        var theme = storedTheme === 'dark' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
